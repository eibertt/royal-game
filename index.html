<!-- SECCIÓN DE BILLETERA FUTURISTA -->

    <div class="flex justify-between items-center mb-6">

    </div>

    <!-- TARJETA DE BALANCE TOTAL -->
    <div class="hologram-card border-green-500/30 bg-green-500/5 p-6 mb-6 text-center">

    <!-- LISTA DE TOKENS -->

        <div class="hologram-card flex items-center justify-between p-4">

                <div class="w-10 h-10 rounded-full bg-green-500/20 border border-green-500 flex items-center justify-center">
                    <span class="font-bold text-green-400">$</span>
                </div>
                <div>
                    <h4 class="font-bold text-sm">USDT</h4>
                    <p class="text-[10px] text-gray-500">0.00 USDT</p>
                </div>
            </div>
            <button class="text-xs font-bold text-cyan-400 border border-cyan-400/30 px-3 py-1 rounded">RETIRAR</button>
        </div>
    </div>

    <button class="w-full mt-8 bg-green-500 hover:bg-green-400 text-black font-black py-4 rounded-xl shadow-[0_0_20px_rgba(34,197,94,0.4)] transition-all">
        CONECTAR BILLETERA TON
