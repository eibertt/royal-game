<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-red: #ff0044; --neon-gold: #ffcc00; --bg-dark: #000005; }
        body { background-color: #000; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; color: white; user-select: none; }

        /* FONDO DE CABINA DE NAVE 4K */
        .bg-cockpit {
            position: fixed; inset: 0;
            background-image: url('https://images.unsplash.com/photo-1603356033288-acfcb54801e6?q=80&w=2560&auto=format&fit=crop'); /* Imagen HD Pesada */
            background-size: cover; background-position: center; opacity: 0.15; z-index: -1;
            filter: blur(2px);
        }

        /* SPLASH SCREEN CINEMÁTICO */
        #splash {
            position: fixed; inset: 0; background: #000; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1s ease;
        }
        .loader-logo {
            width: 200px; height: 200px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/4712/4712126.png'); /* Logo HQ */
            background-size: contain; background-repeat: no-repeat;
            filter: drop-shadow(0 0 30px var(--neon-cyan));
            animation: logo-pulse 2s infinite;
        }
        @keyframes logo-pulse { 0%, 100% { transform: scale(1); opacity: 0.7; } 50% { transform: scale(1.05); opacity: 1; } }

        /* ROBOT TITÁN 4K CON ESTADOS */
        .robot-visual {
            width: 350px; height: 350px;
            background-image: url('https://cdn-icons-png.flaticon.com/512/4712/4712035.png'); /* Robot HQ */
            background-size: contain; background-repeat: no-repeat; background-position: center;
            filter: drop-shadow(0 0 25px var(--neon-cyan));
            animation: robot-idle 5s ease-in-out infinite;
            transition: all 0.2s ease, filter 0.5s ease;
        }
        @keyframes robot-idle { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-25px) rotate(2deg); } }
        
        /* ESTADO: SIN ENERGÍA (CHISPAS ROJAS) */
        .robot-visual.no-energy {
            filter: drop-shadow(0 0 50px var(--neon-red)) saturate(0.2);
            animation: robot-glitch 0.2s infinite;
        }
        @keyframes robot-glitch { 0% { transform: translate(2px, 2px); } 50% { transform: translate(-2px, -2px); } 100% { transform: translate(1px, -1px); } }

        /* EFECTO DE IMPACTO 3D */
        .robot-visual:active { transform: scale(0.85) translateY(10px); }

        /* BARRAS DE ESTADO NEÓN */
        .stat-bar-bg { width: 100%; height: 8px; background: #111; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .stat-fill-cyan { background: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); transition: width 0.3s ease; }
        .stat-fill-gold { background: var(--neon-gold); box-shadow: 0 0 15px var(--neon-gold); transition: width 0.5s ease; }

        /* TEXTO FLOTANTE HQ */
        .floating-value {
            position: absolute; color: #fff; font-weight: 900; font-size: 34px;
            pointer-events: none; animation: valueUp 0.8s cubic-bezier(0.19, 1, 0.22, 1) forwards;
            text-shadow: 0 0 20px var(--neon-cyan); z-index: 50;
        }
        @keyframes valueUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-180px) scale(1.6); opacity: 0; } }
    </style>
</head>
<body>

    <div class="bg-cockpit"></div>

    <div id="splash">
        <div class="loader-logo mb-10"></div>
        <h1 class="text-3xl font-black tracking-widest text-cyan-300">TITAN BOT</h1>
        <p class="text-xs text-cyan-600 mt-2 tracking-widest">PROYECTO: PILOT RISING</p>
        <div class="w-64 h-2 bg-gray-950 mt-10 rounded-full border border-gray-800 overflow-hidden">
            <div id="load-bar" class="h-full bg-cyan-500 w-0 transition-all duration-200"></div>
        </div>
        <p class="text-[10px] text-gray-700 mt-3">INICIALIZANDO SISTEMAS DE NAVE... (Verificando 100MB+ de Datos)</p>
    </div>

    <div id="name-modal" class="fixed inset-0 bg-black/95 z-90 hidden flex items-center justify-center p-6 backdrop-blur-sm">
        <div class="bg-black border-2 border-cyan-500 p-10 rounded-[30px] w-full max-w-lg text-center shadow-[0_0_60px_rgba(0,242,255,0.2)]">
            <div class="loader-logo width-100 height-100 mb-6 mx-auto"></div>
            <p class="text-cyan-400 text-xs mb-2 tracking-widest font-bold">PROTOCOLO DE SEGURIDAD</p>
            <h2 class="text-3xl font-black mb-8 tracking-tighter">REGISTRA TU ALIAS DE PILOTO</h2>
            <input type="text" id="user-name" placeholder="Ej: Comandante_Nova" class="w-full bg-gray-950 border-2 border-cyan-900 p-5 rounded-2xl mb-8 text-center outline-none focus:border-cyan-400 text-cyan-300 text-lg font-bold">
            <button onclick="startGame()" class="w-full bg-cyan-600 hover:bg-cyan-500 text-white py-5 rounded-2xl font-black text-lg shadow-[0_0_30px_rgba(8,145,178,0.7)] transition-all">ACTIVAR NÚCLEO TITÁN</button>
        </div>
    </div>

    <div class="h-screen flex flex-col p-6 z-10 relative">
        
        <div class="flex justify-between items-start mb-12">
            <div>
                <p id="pilot-rank" class="text-[11px] text-amber-400 font-bold uppercase tracking-widest">RANGO: RECLUTA</p>
                <h2 id="display-name" class="text-2xl font-black tracking-tighter text-white">---</h2>
                <div class="stat-bar-bg w-40 mt-1"><div id="rank-fill" class="stat-fill-gold h-full w-0"></div></div>
            </div>
            <div class="text-right">
                <p class="text-[11px] text-gray-500 font-bold">BALANCE TOTAL</p>
                <div class="text-4xl font-black text-cyan-400 tracking-tight">💎 <span id="balance">0.00</span></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col items-center justify-center relative tap-zone" id="click-area">
            <div id="titan-bot-visual" class="robot-visual" onclick="tapRobot(event)"></div>
            <div class="absolute bottom-[-60px] text-center">
                <p class="text-cyan-400 text-sm font-bold animate-pulse tracking-widest">TOCA PARA GENERAR NÚCLEO</p>
                <p class="text-[10px] text-cyan-800">SISTEMA CIBERNÉTICO ACTIVO</p>
            </div>
        </div>

        <div class="mt-20 space-y-3">
            <div class="flex justify-between items-end text-xs font-bold">
                <span class="text-cyan-600">SISTEMA DE ENERGÍA DE IMPACTO</span>
                <span class="text-lg font-black"><span id="energy-text">2000</span> / 2000</span>
            </div>
            <div class="stat-bar-bg"><div id="energy-fill" class="stat-fill-cyan h-full w-full"></div></div>
            
            <button id="ad-btn" onclick="window.open('https://omg10.com')" class="hidden w-full py-5 bg-red-700 hover:bg-red-600 rounded-2xl font-black text-lg mt-5 animate-pulse shadow-[0_0_30px_rgba(255,0,0,0.5)]">
                ⚠️ RECARGA CRÍTICA (VER ANUNCIO)
            </button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        // Datos con localStorage
        let balance = parseFloat(localStorage.getItem('tb_bal')) || 0;
        let energy = parseInt(localStorage.getItem('tb_nrg')) || 2000;
        let pilot = localStorage.getItem('tb_name');
        
        // Configuración de RANGOS (Idea Premium #1)
        const RANGOS = [
            { nombre: "RECLUTA", min: 0, color: "#fff" },
            { nombre: "SARGENTO", min: 2.50, color: "#22d3ee" },
            { nombre: "COMANDANTE", min: 7.50, color: "#a855f7" },
            { nombre: "TITÁN LEGENDARIO", min: 15.00, color: "#ffcc00" }
        ];

        function tapRobot(e) {
            const botVisual = document.getElementById('titan-bot-visual');

            if (energy < 20) {
                // Estado: Sin Energía (Idea Premium #2)
                botVisual.classList.add('no-energy');
                document.getElementById('ad-btn').classList.remove('hidden');
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            // Lógica de Tap
            balance += 0.15;
            energy -= 20;
            save();

            // Efecto Visual HQ
            const v = document.createElement('div');
            v.innerText = "+0.15";
            v.className = 'floating-value';
            v.style.left = (e.clientX - 40) + 'px';
            v.style.top = (e.clientY - 60) + 'px';
            document.body.appendChild(v);
            setTimeout(() => v.remove(), 800);

            // Feedback Háptico Pesado
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            
            botVisual.classList.remove('no-energy'); // Reset estado crítico si toca
            updateUI();
        }

        function startGame() {
            let n = document.getElementById('user-name').value;
            if(n.length > 2) {
                localStorage.setItem('tb_name', n);
                pilot = n;
                document.getElementById('name-modal').classList.add('hidden');
                document.getElementById('display-name').innerText = pilot;
                if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }
        }

        function save() {
            localStorage.setItem('tb_bal', balance);
            localStorage.setItem('tb_nrg', energy);
        }

        function updateUI() {
            // Actualizar Balance y Energía
            document.getElementById('balance').innerText = balance.toFixed(2);
            document.getElementById('energy-text').innerText = energy;
            document.getElementById('energy-fill').style.width = (energy / 20) + "%";

            // Lógica de Anuncios
            if(energy >= 20) document.getElementById('ad-btn').classList.add('hidden');
            else document.getElementById('titan-bot-visual').classList.add('no-energy');

            // Lógica de RANGOS PRO
            let actualRange = RANGOS[0];
            let nextRangeMin = RANGOS[1].min;

            for(let i = RANGOS.length - 1; i >= 0; i--) {
                if(balance >= RANGOS[i].min) {
                    actualRange = RANGOS[i];
                    nextRangeMin = RANGOS[i+1] ? RANGOS[i+1].min : RANGOS[i].min;
                    break;
                }
            }

            // Actualizar Interfaz de Rango
            const rankText = document.getElementById('pilot-rank');
            rankText.innerText = "RANGO: " + actualRange.nombre;
            rankText.style.color = actualRange.color;
            
            // Barra de progreso de Rango
            let progreso = 0;
            if(RANGOS.indexOf(actualRange) < RANGOS.length - 1) {
                progreso = ((balance - actualRange.min) / (nextRangeMin - actualRange.min)) * 100;
            } else { progreso = 100; } // Rango Máximo
            
            document.getElementById('rank-fill').style.width = progreso + "%";
        }

        // Carga Cinemática Inicial (Estilo 100MB)
        window.onload = () => {
            let p = 0;
            let iv = setInterval(() => {
                p += 2;
                document.getElementById('load-bar').style.width = p + "%";
                if(p >= 100) {
                    clearInterval(iv);
                    document.getElementById('splash').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('splash').style.display = 'none';
                        if(!pilot) document.getElementById('name-modal').classList.remove('hidden');
                        else document.getElementById('display-name').innerText = pilot;
                    }, 1000);
                }
            }, 50); // Carga más lenta para simular peso
            updateUI();
        };

        // Recuperación de energía (Lenta: 4 puntos cada 3 segundos)
        setInterval(() => { if(energy < 2000) { energy += 4; updateUI(); } }, 3000);
    </script>
</body>
</html>
