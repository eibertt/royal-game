<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #7d2ae8; --cyan: #00f2ff; --bg: #050505; }
        body { background: var(--bg); font-family: 'Orbitron', sans-serif; color: white; margin: 0; overflow: hidden; height: 100vh; }
        
        .tab-content { display: none; height: calc(100vh - 80px); overflow-y: auto; padding: 20px; }
        .tab-content.active { display: block; }

        /* NAVEGACIÓN ESTILO PREMIUM */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 85px;
            background: rgba(10, 10, 20, 0.95); backdrop-filter: blur(10px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 1px solid rgba(125, 42, 232, 0.3); z-index: 100;
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #555; transition: 0.3s; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--cyan); }
        .nav-item.active .nav-icon { filter: drop-shadow(0 0 8px var(--cyan)); transform: scale(1.1); }
        .nav-icon { width: 28px; height: 28px; margin-bottom: 5px; transition: 0.3s; }

        /* HOME: PERSONAJES SEGÚN RANGO */
        .character-box { position: relative; width: 300px; height: 300px; margin: auto; }
        .robot-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 0 20px var(--cyan)); animation: float 4s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* EARNINGS: NAVES DE MINERÍA */
        .ship-card {
            background: linear-gradient(145deg, #0f172a, #020617);
            border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 20px;
            padding: 15px; margin-bottom: 15px; position: relative; overflow: hidden;
        }
        .ship-card::after { content: ''; position: absolute; top: 0; right: 0; width: 40px; height: 40px; background: var(--cyan); opacity: 0.05; border-radius: 0 0 0 100%; }
        .buy-btn { background: var(--cyan); color: black; font-weight: 900; border-radius: 10px; padding: 8px 15px; font-size: 12px; }

        /* EFECTO DE CLIC (FLOATING TEXT) */
        .tap-text { position: absolute; font-weight: 900; color: var(--cyan); animation: fly 0.6s forwards; pointer-events: none; z-index: 200; }
        @keyframes fly { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div id="home" class="tab-content active text-center flex flex-col justify-center">
        <div class="mb-4">
            <p id="rank-name" class="text-amber-400 text-[10px] font-black tracking-widest">RANGO: RECLUTA</p>
            <h1 class="text-4xl font-black text-white" id="balance">0.000</h1>
            <p class="text-cyan-500 text-[10px]">T-COINS GENERADOS</p>
        </div>
        
        <div class="character-box" onclick="makeTap(event)">
            <img id="robot-display" src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="robot-img">
        </div>
        
        <div class="mt-10 px-6">
            <div class="flex justify-between text-[10px] mb-1 font-bold"><span>NIVEL DE NÚCLEO</span><span id="energy-txt">1000/1000</span></div>
            <div class="w-full h-2 bg-gray-900 rounded-full border border-cyan-900 overflow-hidden">
                <div id="energy-bar" class="h-full bg-cyan-500 shadow-[0_0_10px_#00f2ff]" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <div id="earnings" class="tab-content">
        <h2 class="text-xl font-black mb-6 border-b border-cyan-900 pb-2">FLOTA DE MINERÍA</h2>
        
        <div class="ship-card flex justify-between items-center">
            <div>
                <h3 class="font-bold text-cyan-400">NAVE LVL 1</h3>
                <p class="text-[10px] text-gray-400">Producción: 10 T/h</p>
            </div>
            <button class="buy-btn">2 USDT</button>
        </div>

        <div class="ship-card flex justify-between items-center">
            <div>
                <h3 class="font-bold text-purple-400">NAVE LVL 2</h3>
                <p class="text-[10px] text-gray-400">Producción: 50 T/h</p>
            </div>
            <button class="buy-btn">5 USDT</button>
        </div>

        <div class="ship-card border-amber-500 bg-amber-950/20 flex justify-between items-center">
            <div>
                <h3 class="font-bold text-amber-500">PREMIUM GALAXY</h3>
                <p class="text-[10px] text-gray-400">Producción: 20,000 T/h</p>
            </div>
            <div class="text-right">
                <p class="text-[8px] text-amber-500 line-through">50 USDT</p>
                <button class="buy-btn bg-amber-500">15 USDT</button>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="showTab('home', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/1946/1946436.png" class="nav-icon">
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="showTab('group', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/681/681494.png" class="nav-icon">
            <span>Group</span>
        </div>
        <div id="center-nav" class="nav-item" onclick="showTab('earnings', this)">
            <div class="bg-cyan-600 p-3 rounded-full -mt-10 shadow-lg border-4 border-black">
                <img src="https://cdn-icons-png.flaticon.com/512/1355/1355238.png" class="nav-icon !m-0 !filter-none">
            </div>
            <span class="mt-1">Earnings</span>
        </div>
        <div class="nav-item" onclick="showTab('accelerate', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png" class="nav-icon">
            <span>Accelerate</span>
        </div>
        <div class="nav-item" onclick="showTab('wallet', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/855/855275.png" class="nav-icon">
            <span>Wallet</span>
        </div>
    </nav>

    <script>
        let balance = 0;
        let energy = 1000;
        let tg = window.Telegram.WebApp;

        // LÓGICA DE TABS
        function showTab(tabId, el) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        // LÓGICA DE TAP Y RANGOS
        function makeTap(e) {
            if(energy < 10) return;

            balance += 0.001;
            energy -= 10;
            
            // Actualizar Rango y Robot
            updateRank();

            // Texto flotante
            const txt = document.createElement('div');
            txt.innerText = "+0.001";
            txt.className = 'tap-text';
            txt.style.left = e.clientX + 'px';
            txt.style.top = e.clientY + 'px';
            document.body.appendChild(txt);
            setTimeout(() => txt.remove(), 600);

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            updateUI();
        }

        function updateRank() {
            const robot = document.getElementById('robot-display');
            const rankLabel = document.getElementById('rank-name');

            if(balance >= 1.0) {
                rankLabel.innerText = "RANGO: TITÁN LEYENDA";
                robot.src = "https://cdn-icons-png.flaticon.com/512/4712/4712109.png"; // Robot Evolucionado
                robot.style.filter = "drop-shadow(0 0 30px #ffcc00)";
            } else if(balance >= 0.5) {
                rankLabel.innerText = "RANGO: SARGENTO";
                robot.src = "https://cdn-icons-png.flaticon.com/512/4712/4712038.png"; // Robot Intermedio
                robot.style.filter = "drop-shadow(0 0 25px #a855f7)";
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(3);
            document.getElementById('energy-txt').innerText = energy + "/1000";
            document.getElementById('energy-bar').style.width = (energy/10) + "%";
        }

        setInterval(() => { if(energy < 1000) { energy += 5; updateUI(); } }, 2000);
    </script>
</body>
</html>
