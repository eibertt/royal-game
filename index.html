<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --dark-space: #010103; }
        
        body { 
            background: var(--dark-space); font-family: 'Orbitron', sans-serif; 
            color: white; margin: 0; overflow: hidden; height: 100vh;
        }

        /* EL FONDO QUE TE GUSTÓ (MOVIBLE Y CINEMÁTICO) */
        .cyber-bg {
            position: fixed; inset: 0; z-index: -1;
            background-image: 
                linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(15,0,30,0.8)),
                url('https://images.unsplash.com/photo-1614728263952-84ea256f9679?auto=format&fit=crop&q=80&w=2000');
            background-size: cover; background-position: center;
            animation: bg-drift 30s infinite alternate ease-in-out;
        }
        @keyframes bg-drift { from { transform: scale(1.1) translate(-1%, -1%); } to { transform: scale(1.2) translate(1%, 1%); } }

        /* HUD SUPERIOR: ESTILO CABINA DE MANDO */
        .cockpit-hud {
            position: fixed; top: 0; width: 100%; padding: 25px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
            z-index: 100; display: flex; justify-content: space-between;
        }
        .stat-panel {
            border-left: 3px solid var(--neon-cyan); padding-left: 15px;
            background: rgba(0, 242, 255, 0.03); backdrop-filter: blur(5px);
        }

        /* EL TITÁN (METAL PESADO INDUSTRIAL) */
        .titan-container {
            width: 100%; height: 60vh; display: flex; align-items: center; justify-content: center;
            margin-top: 80px; position: relative;
        }
        .main-titan {
            width: 85%; max-width: 420px;
            filter: drop-shadow(0 0 35px var(--neon-cyan));
            animation: mecha-float 4s infinite ease-in-out;
            transition: 0.1s; user-select: none;
        }
        @keyframes mecha-float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px) scale(1.02); } }
        .main-titan:active { transform: scale(0.9) brightness(1.5); }

        /* NAV: ESTILO DASHBOARD MILITAR */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 95px;
            background: rgba(5, 5, 15, 0.95); backdrop-filter: blur(25px);
            border-top: 1px solid rgba(0, 242, 255, 0.2);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-link { 
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            opacity: 0.3; transition: 0.4s;
        }
        .nav-link.active { opacity: 1; transform: translateY(-8px); color: var(--neon-cyan); }
        .nav-frame {
            width: 45px; height: 45px; border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1); overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .active .nav-frame { border-color: var(--neon-cyan); box-shadow: 0 0 20px var(--neon-cyan); }
        .nav-img { width: 100%; height: 100%; object-fit: cover; }

        /* VISTAS */
        .view-content { display: none; height: 100vh; padding: 25px; padding-top: 120px; overflow-y: auto; }
        .view-content.active { display: block; animation: view-zoom 0.4s ease; }
        @keyframes view-zoom { from { opacity: 0; transform: scale(1.05); } to { opacity: 1; transform: scale(1); } }

        /* EFECTO DE IMPACTO: DATOS FLOTANTES */
        .tap-data {
            position: absolute; font-weight: 900; color: var(--neon-cyan); animation: flyOut 0.7s forwards;
            pointer-events: none; z-index: 200; font-size: 20px; text-shadow: 0 0 10px var(--neon-cyan);
        }
        @keyframes flyOut { from { opacity: 1; transform: translateY(0) scale(1); } to { opacity: 0; transform: translateY(-120px) scale(1.4); } }
    </style>
</head>
<body>

    <div class="cyber-bg"></div>

    <div class="cockpit-hud">
        <div class="stat-panel">
            <p id="pilot-rank" class="text-[8px] text-purple-400 font-black tracking-[4px]">STATUS: PILOTO RECLUTA</p>
            <h1 class="text-4xl font-black text-white tracking-tighter" id="balance">0.000</h1>
        </div>
        <div class="text-right">
            <p class="text-[9px] text-cyan-500 font-bold mb-1">ENERGÍA CRÍTICA</p>
            <div class="w-20 h-1 bg-gray-900 rounded-full overflow-hidden">
                <div id="energy-bar" class="h-full bg-cyan-400" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <div id="home" class="view-content active">
        <div class="titan-container" onclick="handleMining(event)">
            <img id="titan-visual" src="https://www.pngmart.com/files/11/Sci-Fi-Robot-PNG-Transparent-Image.png" class="main-titan rounded-full">
            <div class="absolute bottom-[-20px] text-cyan-400 text-[10px] font-black animate-pulse">PULSA PARA SOBRECARGA</div>
        </div>
    </div>

    <div id="earnings" class="view-content">
        <h2 class="text-2xl font-black text-cyan-400 mb-8 tracking-tighter">FLOTA NOVA DE MINERÍA</h2>
        
        <div class="ship-entry flex items-center gap-4 mb-4 border-l-4 border-l-cyan-500 bg-black/30 p-4 rounded-xl">
            <img src="https://images.unsplash.com/photo-1603356033288-acfcb54801e6?auto=format&fit=crop&q=80&w=300" class="w-16 h-16 rounded-lg object-cover">
            <div class="flex-1">
                <h3 class="font-bold text-sm text-white">INTERCEPTOR V1</h3>
                <p class="text-[10px] text-cyan-600">Producción: 10 T/h</p>
            </div>
            <button class="bg-cyan-500 text-black font-black px-4 py-2 rounded-lg text-xs">2 USDT</button>
        </div>

        <div class="ship-entry flex items-center gap-4 border-l-4 border-l-amber-500 bg-black/30 p-4 rounded-xl">
            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=300" class="w-16 h-16 rounded-lg object-cover">
            <div class="flex-1">
                <h3 class="font-bold text-sm text-amber-500">TITÁN GALAXY</h3>
                <p class="text-[10px] text-gray-500">Producción: 20k T/h</p>
            </div>
            <button class="bg-amber-600 text-black font-black px-4 py-2 rounded-lg text-xs">15 USDT</button>
        </div>
    </div>

    <div id="group" class="view-content"><h2 class="text-2xl font-black">UNIÓN DE CLANES</h2></div>
    <div id="accelerate" class="view-content"><h2 class="text-2xl font-black text-red-500">BOOSTERS</h2></div>
    <div id="wallet" class="view-content"><h2 class="text-2xl font-black text-green-500">BILLETERA USDT</h2></div>

    <nav>
        <div class="nav-link active" onclick="switchView('home', this)">
            <div class="nav-frame"><img src="https://cdn-icons-png.flaticon.com/512/3563/3563417.png" class="nav-img"></div>
            <span class="text-[8px] font-black">HOME</span>
        </div>
        <div class="nav-link" onclick="switchView('group', this)">
            <div class="nav-frame"><img src="https://cdn-icons-png.flaticon.com/512/1189/1189132.png" class="nav-img"></div>
            <span class="text-[8px] font-black">GROUP</span>
        </div>
        <div class="nav-link" onclick="switchView('earnings', this)">
            <div class="nav-frame" style="background: rgba(157,0,255,0.1);"><img src="https://cdn-icons-png.flaticon.com/512/2534/2534204.png" class="nav-img"></div>
            <span class="text-[8px] font-black">EARN</span>
        </div>
        <div class="nav-link" onclick="switchView('accelerate', this)">
            <div class="nav-frame"><img src="https://cdn-icons-png.flaticon.com/512/3163/3163624.png" class="nav-img"></div>
            <span class="text-[8px] font-black">BOOST</span>
        </div>
        <div class="nav-link" onclick="switchView('wallet', this)">
            <div class="nav-frame"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" class="nav-img"></div>
            <span class="text-[8px] font-black">WALLET</span>
        </div>
    </nav>

    <script>
        let balance = 0;
        let energy = 2000;
        let tg = window.Telegram.WebApp;

        function switchView(id, el) {
            document.querySelectorAll('.view-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function handleMining(e) {
            if(energy < 10) return;
            balance += 0.001;
            energy -= 10;
            
            // Texto de impacto HQ
            const point = document.createElement('div');
            point.innerText = "+0.001";
            point.className = 'tap-data';
            point.style.left = e.clientX + 'px';
            point.style.top = e.clientY + 'px';
            document.body.appendChild(point);
            setTimeout(() => point.remove(), 600);

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(3);
            document.getElementById('energy-bar').style.width = (energy/20) + "%";
            
            // Evolución Visual Real
            if(balance >= 0.5) {
                document.getElementById('pilot-rank').innerText = "STATUS: COMANDANTE";
                document.getElementById('titan-visual').src = "https://www.pngmart.com/files/11/Sci-Fi-Robot-PNG-Photos.png";
            }
        }

        setInterval(() => { if(energy < 2000) { energy += 5; updateUI(); } }, 2000);
        window.onload = () => { tg.expand(); updateUI(); };
    </script>
</body>
</html>
