<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #9d00ff; }
        body { 
            background: #050510; font-family: 'Orbitron', sans-serif; color: white; 
            margin: 0; overflow: hidden; height: 100vh;
            background-image: 
                linear-gradient(to bottom, rgba(5,5,16,0.8), rgba(5,5,16,0.9)),
                url('https://wallpaperaccess.com/full/491173.jpg'); /* Ciudad Cyberpunk */
            background-size: cover; background-position: center;
        }

        /* NAVEGACIÓN PRO (ESTILO HAMSTER KOMBAT) */
        nav {
            position: fixed; bottom: 15px; left: 15px; right: 15px; height: 80px;
            background: rgba(15, 15, 30, 0.95); backdrop-filter: blur(10px);
            border-radius: 25px; border: 1px solid rgba(0, 242, 255, 0.3);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .nav-item { opacity: 0.4; transition: 0.3s; text-align: center; font-size: 8px; }
        .nav-item.active { opacity: 1; color: var(--neon); transform: translateY(-5px); }
        .nav-icon { width: 30px; height: 30px; margin-bottom: 4px; filter: drop-shadow(0 0 5px var(--neon)); }

        /* VISTAS DINÁMICAS */
        .page { display: none; height: 80vh; padding: 20px; overflow-y: auto; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* EL ROBOT TITÁN (Centrado y Grande) */
        .robot-container {
            width: 100%; height: 50vh; display: flex; align-items: center; justify-content: center;
            position: relative; margin-top: 20px;
        }
        .robot-img {
            width: 80%; max-width: 320px; 
            filter: drop-shadow(0 0 30px var(--neon));
            animation: breathe 4s infinite ease-in-out;
            cursor: pointer; z-index: 10;
        }
        @keyframes breathe { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05) translateY(-10px); } }

        /* CARTAS DE NAVES (EARNINGS) */
        .ship-card {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 15px;
        }
        .ship-img { width: 60px; height: 60px; border-radius: 12px; border: 1px solid var(--neon); }

        /* MONEDAS FLOTANTES */
        .tap-effect {
            position: absolute; color: var(--neon); font-weight: 900; font-size: 28px;
            pointer-events: none; animation: floatUp 0.6s forwards; z-index: 100;
        }
        @keyframes floatUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="p-6 flex justify-between items-start">
        <div>
            <p id="rank-name" class="text-[10px] text-purple-400 font-black tracking-widest">RANGO: RECLUTA</p>
            <h1 class="text-4xl font-black text-white" id="balance">0.000</h1>
            <p class="text-[8px] text-cyan-500">T-COINS EXTRAÍDOS</p>
        </div>
        <div class="text-right">
            <span class="text-[10px] block mb-1">ENERGÍA</span>
            <div class="w-24 h-2 bg-gray-900 rounded-full border border-cyan-900 overflow-hidden">
                <div id="energy-bar" class="h-full bg-cyan-500" style="width: 100%"></div>
            </div>
        </div>
    </div>

    <div id="page-home" class="page active">
        <div class="robot-container" onclick="doTap(event)">
            <img id="robot-img" src="https://www.pngmart.com/files/11/Sci-Fi-Robot-PNG-Transparent-Image.png" class="robot-img">
        </div>
        <div class="text-center mt-4">
            <p class="text-cyan-400 text-[10px] animate-pulse">TOQUE EL NÚCLEO PARA MINAR</p>
        </div>
    </div>

    <div id="page-earnings" class="page">
        <h2 class="text-xl font-black text-cyan-400 mb-6 border-b border-cyan-900 pb-2">FLOTA DE MINERÍA</h2>
        
        <div class="ship-card">
            <img src="https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=200" class="ship-img">
            <div class="flex-1">
                <h3 class="font-bold text-sm">DRILL-BOT V1</h3>
                <p class="text-[10px] text-gray-500">Minado: 10/h</p>
            </div>
            <button class="bg-cyan-500 text-black font-black px-4 py-2 rounded-xl text-[10px]">2 USDT</button>
        </div>

        <div class="ship-card border-amber-600 bg-amber-900/10">
            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=200" class="ship-img">
            <div class="flex-1">
                <h3 class="font-bold text-sm text-amber-500">TITÁN GALAXY</h3>
                <p class="text-[10px] text-gray-400">Minado: 20,000/h</p>
            </div>
            <button class="bg-amber-600 text-black font-black px-4 py-2 rounded-xl text-[10px]">15 USDT</button>
        </div>
    </div>

    <div id="page-group" class="page"><h2 class="text-center mt-20 text-purple-500">CLANES CIBERNÉTICOS</h2></div>
    <div id="page-accelerate" class="page"><h2 class="text-center mt-20 text-red-500">ACELERADORES</h2></div>
    <div id="page-wallet" class="page"><h2 class="text-center mt-20 text-green-500">BILLETERA USDT</h2></div>

    <nav>
        <div class="nav-item active" onclick="navTo('home', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/3563/3563417.png" class="nav-icon">
            <div>HOME</div>
        </div>
        <div class="nav-item" onclick="navTo('group', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/1189/1189132.png" class="nav-icon">
            <div>GROUP</div>
        </div>
        <div class="nav-item" onclick="navTo('earnings', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/2534/2534204.png" class="nav-icon">
            <div>EARN</div>
        </div>
        <div class="nav-item" onclick="navTo('accelerate', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/3163/3163624.png" class="nav-icon">
            <div>BOOST</div>
        </div>
        <div class="nav-item" onclick="navTo('wallet', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" class="nav-icon">
            <div>WALLET</div>
        </div>
    </nav>

    <script>
        let balance = 0;
        let energy = 2000;
        let tg = window.Telegram.WebApp;

        function navTo(pageId, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('page-' + pageId).classList.add('active');
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function doTap(e) {
            if(energy < 10) return;
            balance += 0.001;
            energy -= 10;
            
            // Efecto de moneda
            const t = document.createElement('div');
            t.innerText = "+0.001";
            t.className = 'tap-effect';
            t.style.left = e.clientX + 'px';
            t.style.top = e.clientY + 'px';
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 600);

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(3);
            document.getElementById('energy-bar').style.width = (energy/20) + "%";
            
            // Cambio de Rango y Robot Real
            if(balance >= 0.5) {
                document.getElementById('rank-name').innerText = "RANGO: SARGENTO";
                document.getElementById('robot-img').src = "https://www.pngmart.com/files/11/Sci-Fi-Robot-PNG-Photos.png";
            }
        }

        setInterval(() => { if(energy < 2000) { energy += 5; updateUI(); } }, 2000);
        window.onload = () => { tg.expand(); updateUI(); };
    </script>
</body>
</html>
