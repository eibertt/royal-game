<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN B: DRIVE TEST</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00f2ff; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>SISTEMA EN LÍNEA</h1>
        <p>ARCHIVO DRIVE DETECTADO</p>
    </div>

    <script>
        // --- CONFIGURACIÓN DE TU ENLACE ---
        const DRIVE_ID = '1mYO2_VCIEtHCicwIS76nSmoP8bMyNaAD';
        const directLink = `https://docs.google.com/uc?export=download&id=${DRIVE_ID}`;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ILUMINACIÓN
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        camera.position.z = 5;

        // PRUEBA DE CARGA (Detecta si es Modelo o Imagen)
        const loader = new THREE.GLTFLoader();
        const textureLoader = new THREE.TextureLoader();

        // Intentamos cargar como modelo 3D (Robot)
        loader.load(directLink, 
            (gltf) => {
                scene.add(gltf.scene);
                gltf.scene.scale.set(2,2,2);
                console.log("¡Modelo 3D cargado desde Drive!");
            },
            undefined,
            (err) => {
                // Si falla como 3D, lo ponemos como FONDO (Imagen)
                textureLoader.load(directLink, (texture) => {
                    scene.background = texture;
                    console.log("¡Imagen de fondo cargada desde Drive!");
                });
            }
        );

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
