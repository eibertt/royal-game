<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Estos scripts son esenciales para que funcionen las librerías externas -->
    <script src="https://telegram.org"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    
    <style>
        /* Mantenemos tus estilos originales aquí */
        :root { --neon-cyan: #00f2ff; --neon-purple: #bc13fe; --bg-dark: #020205; }
        body { 
            background: var(--bg-dark); font-family: 'Orbitron', sans-serif; 
            color: white; margin: 0; overflow: hidden; height: 100vh;
            background-image: radial-gradient(circle at center, #0a0a20 0%, #000 100%);
        }
        /* ... el resto de tus estilos CSS ... */
    </style>
</head>
<body>
    <!-- Tu estructura HTML completa aquí -->
    
    <script>
        // Inicializar la WebApp de Telegram para que funcione dentro de la app
        if (window.Telegram && window.Telegram.WebApp) {
            window.Telegram.WebApp.ready();
            window.Telegram.WebApp.expand(); // Abre la app a pantalla completa
        }
        
        // Aquí va tu lógica de balance y pestañas
    </script>
</body>
</html>
