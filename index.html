<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN B - SISTEMA OPERATIVO</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="assets/fondo.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="game-container">
        <div class="hologram-panel" style="display: flex; justify-content: space-between; padding: 15px; margin: 15px;">
            <div>
                <small style="color: #ff00de">T-COINS</small>
                <div id="coin-balance" style="font-size: 1.8rem; font-weight: bold;">0</div>
            </div>
            <div style="text-align: right;">
                <small>RANGO ACTUAL</small>
                <div id="rank-display" style="color: #00e5ff;">RECLUTA</div>
            </div>
        </div>

        <div id="robot-container" style="width: 100%; height: 350px; margin: 20px 0; position: relative; z-index: 5;" onclick="if(window.handleRobotTap) window.handleRobotTap(); if(typeof handleTap === 'function') handleTap(event);">
            </div>

        <div class="hologram-panel" style="margin: 15px; padding: 10px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span>ESTADO: <span id="system-status" style="color: #00e5ff;">INICIANDO MOTOR 3D...</span></span>
                <span id="xp-text">XP: 0 / 4500</span>
            </div>
            <div style="width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; margin-top: 5px; border: 1px solid #00e5ff;">
                <div id="xp-bar" style="width: 0%; height: 100%; background: #00e5ff; box-shadow: 0 0 15px #00e5ff;"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="location.reload()">HOME</div>
            <div class="nav-item" onclick="jugarRuleta()">CASINO</div>
            <div class="nav-item" style="color: #ffcc00; font-weight: bold;" onclick="abrirTienda()">SHIPS</div>
            <div class="nav-item" onclick="reclamarBonoReferido()">FRIENDS</div>
            <div class="nav-item" onclick="conectarBilletera()">WALLET</div>
        </nav>
    </div>

    <script type="module" src="assets/robot_3d.js?v=12"></script>
    
    <script src="config.js?v=12"></script>
    <script src="render_engine.js?v=12"></script>
    <script src="game_logic.js?v=12"></script>
    <script src="casino_logic.js?v=12"></script>
    <script src="referrals.js?v=12"></script>
    <script src="wallet_system.js?v=12"></script>

    <script>
        // Verificación de carga final
        window.onload = function() {
            console.log("TITAN B: Todos los sistemas y motores 3D vinculados.");
            const status = document.getElementById('system-status');
            if(status) {
                status.innerText = "ONLINE";
                status.style.color = "#00ff88"; // Verde neón al estar listo
            }
        };

        // Respaldo de la tienda en caso de que shop_system.js tarde en cargar
        function abrirTienda() {
            alert("--- ASTILLERO IMPERIAL ---\n\n1. Scout C-1: $1 USDT (+100 T-Coins/hr)\n2. Heavy Miner: $5 USDT (+600 T-Coins/hr)\n3. TITAN A-15: $15 USDT (+2500 T-Coins/hr)\n\nInvita amigos para ganar un bono de +5000 T-Coins.");
        }
    </script>
</body>
</html>
