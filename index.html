<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN B: REVOLUTION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        /* VIDEO DE FONDO INFINITO */
        #bg-video {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; z-index: -1; /* Detrás de todo */
            filter: brightness(0.4); /* Para que el HUD resalte más */
        }

        /* INTERFAZ DEL JUEGO */
        #gui { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; color: #00f2ff; }
        .bar-bg { width: 180px; height: 10px; border: 1px solid #00f2ff; margin-top: 10px; background: rgba(0,242,255,0.1); }
        #energy-bar { width: 100%; height: 100%; background: #00f2ff; box-shadow: 0 0 10px #00f2ff; }
        .floating-text { position: absolute; color: #fff; font-weight: bold; pointer-events: none; animation: floatUp 1s forwards; }
        @keyframes floatUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <video id="bg-video" autoplay loop muted playsinline>
        <source src="intro.mp4" type="video/mp4">
    </video>

    <div id="gui">
        <h1>TITAN B: EVOLUTION</h1>
        <p>T-COINS: <span id="coin-txt">0</span></p>
        <p>ENERGÍA: <span id="nrg-txt">100</span>%</p>
        <div class="bar-bg"><div id="energy-bar"></div></div>
    </div>

    <script>
        let coins = parseInt(localStorage.getItem('tcoins')) || 0;
        let energy = 100;

        // MOTOR 3D (Transparente para ver el video)
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true }); // 'alpha' permite ver el video de fondo
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ILUMINACIÓN
        scene.add(new THREE.AmbientLight(0xffffff, 1.5));

        // CARGA DEL ROBOT
        const textureLoader = new THREE.TextureLoader();
        let robot;
        textureLoader.load('robot1.png', (tex) => {
            const mat = new THREE.SpriteMaterial({ map: tex });
            robot = new THREE.Sprite(mat);
            robot.scale.set(4, 4, 1);
            scene.add(robot);
        });

        // MINERÍA
        window.addEventListener('mousedown', (e) => {
            if(energy >= 5) {
                energy -= 5; coins += 10;
                localStorage.setItem('tcoins', coins);
                actualizarUI();
                
                // Efecto +10
                const t = document.createElement('div');
                t.className = 'floating-text';
                t.innerText = '+10';
                t.style.left = e.clientX + 'px'; t.style.top = e.clientY + 'px';
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 1000);
            }
        });

        function actualizarUI() {
            document.getElementById('coin-txt').innerText = coins;
            document.getElementById('nrg-txt').innerText = energy;
            document.getElementById('energy-bar').style.width = energy + "%";
        }

        camera.position.z = 5;
        function animate() {
            requestAnimationFrame(animate);
            if(robot) robot.position.y = Math.sin(Date.now() * 0.002) * 0.15;
            renderer.render(scene, camera);
        }
        animate();
        actualizarUI();
    </script>
</body>
</html>
