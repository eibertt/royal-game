<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --c-neon: #00f2ff; --c-purple: #9d00ff; --glass: rgba(0, 10, 20, 0.85); }
        
        body { 
            background: #000; font-family: 'Orbitron', sans-serif; color: white; 
            margin: 0; overflow: hidden; height: 100vh;
            /* FONDO DE CIUDAD CYBERPUNK 4K */
            background-image: url('https://w0.peakpx.com/wallpaper/705/181/HD-wallpaper-cyberpunk-city-street-future-scifi.jpg');
            background-size: cover; background-position: center;
        }

        /* CAPA DE OSCURECIMIENTO PARA QUE RESALTE EL ROBOT */
        .overlay { position: fixed; inset: 0; background: linear-gradient(to top, #000 10%, transparent 90%); z-index: 0; }

        /* NAVEGACIÓN ESTILO "DASHBOARD" DE NAVE */
        nav {
            position: fixed; bottom: 0; width: 100%; height: 100px;
            background: var(--glass); backdrop-filter: blur(20px);
            display: flex; justify-content: space-around; align-items: center;
            border-top: 2px solid var(--c-purple); z-index: 1000;
            box-shadow: 0 -10px 30px rgba(157, 0, 255, 0.3);
        }

        .nav-item { 
            display: flex; flex-direction: column; align-items: center; 
            filter: grayscale(1); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .nav-item.active { filter: grayscale(0); transform: translateY(-10px); }
        
        .nav-icon-frame {
            width: 50px; height: 50px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            display: flex; items-center; justify-center; overflow: hidden;
        }
        .nav-item.active .nav-icon-frame { border-color: var(--c-neon); box-shadow: 0 0 15px var(--c-neon); }
        .nav-img { width: 100%; height: 100%; object-fit: cover; }
        .nav-text { font-size: 8px; margin-top: 5px; font-weight: 900; letter-spacing: 1px; color: #555; }
        .active .nav-text { color: var(--c-neon); }

        /* EL ROBOT - Renderizado 3D */
        .robot-stage {
            position: relative; z-index: 10; width: 100%; height: 60vh;
            display: flex; align-items: center; justify-content: center;
            margin-top: 60px;
        }
        .titan-model {
            width: 85%; max-width: 450px;
            filter: drop-shadow(0 0 40px rgba(0, 242, 255, 0.5));
            animation: titan-float 4s infinite ease-in-out;
            cursor: pointer;
        }
        @keyframes titan-float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-25px) rotate(1deg); } }
        .titan-model:active { transform: scale(0.92) translateY(5px); transition: 0.1s; }

        /* INTERFAZ HOLOGRAMA */
        .hud-top {
            position: fixed; top: 20px; left: 20px; right: 20px; z-index: 100;
            display: flex; justify-content: space-between;
        }
        .hud-box {
            background: rgba(0, 242, 255, 0.05); border-left: 4px solid var(--c-neon);
            padding: 10px 20px; backdrop-filter: blur(10px);
        }

        /* PESTAÑAS */
        .view { display: none; height: calc(100vh - 100px); overflow-y: auto; padding: 20px; z-index: 20; position: relative; }
        .view.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* SHIP CARDS HQ */
        .ship-card {
            background: linear-gradient(90deg, #0a0a1a, #1a1a3a);
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 20px;
            border: 1px solid rgba(157, 0, 255, 0.2);
        }
        .ship-visual { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; border: 2px solid #333; }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <div class="hud-top">
        <div class="hud-box">
            <p id="rank-txt" class="text-[9px] text-purple-400 font-black tracking-widest">PILOTO: RECLUTA</p>
            <h1 class="text-3xl font-black text-white" id="balance">0.000</h1>
            <p class="text-[8px] text-cyan-500">T-COINS GENERADOS</p>
        </div>
        <div class="text-right">
            <p class="text-[9px] font-black">SISTEMA OK</p>
            <div class="w-24 h-1 bg-gray-800 mt-2"><div id="nrg-fill" class="h-full bg-cyan-400 w-full shadow-[0_0_10px_cyan]"></div></div>
        </div>
    </div>

    <div id="view-home" class="view active">
        <div class="robot-stage" onclick="makeTap(event)">
            <img id="main-titan" src="https://purepng.com/public/uploads/large/purepng.com-robotrobotprogrammable-machineelectronic-computermachinery-1701528351543atpxu.png" class="titan-model">
        </div>
        
        <div class="absolute bottom-24 left-0 w-full text-center">
            <p class="text-[10px] text-cyan-400 font-bold animate-pulse tracking-[5px]">TOQUE PARA MINAR NÚCLEO</p>
        </div>
    </div>

    <div id="view-earnings" class="view mt-20">
        <h2 class="text-xl font-black mb-6 border-b-2 border-cyan-500 pb-2">CENTRO DE MINERÍA</h2>
        
        <div class="ship-card">
            <img src="https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=200" class="ship-visual">
            <div class="flex-1">
                <h3 class="font-bold text-cyan-400">DRILL-BOT LVL 1</h3>
                <p class="text-[10px] text-gray-400">Producción: 10 T/h</p>
            </div>
            <button class="bg-cyan-500 text-black font-black px-4 py-2 rounded-lg text-xs shadow-lg">2 USDT</button>
        </div>

        <div class="ship-card border-amber-500">
            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=200" class="ship-visual">
            <div class="flex-1">
                <h3 class="font-bold text-amber-500">GALAXY PREMIUM</h3>
                <p class="text-[10px] text-gray-400">Producción: 20,000 T/h</p>
            </div>
            <button class="bg-amber-600 text-black font-black px-4 py-2 rounded-lg text-xs">15 USDT</button>
        </div>
    </div>

    <div id="view-group" class="view mt-20 text-center"><h2 class="text-2xl font-black">RANKING DE CLANES</h2></div>
    <div id="view-accelerate" class="view mt-20 text-center"><h2 class="text-2xl font-black text-red-500">ACELERADORES</h2></div>
    <div id="view-wallet" class="view mt-20 text-center"><h2 class="text-2xl font-black text-green-500">BILLETERA USDT</h2></div>

    <nav>
        <div class="nav-item active" onclick="changeTab('home', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/4712/4712035.png" class="nav-img"></div>
            <span class="nav-text">HOME</span>
        </div>
        <div class="nav-item" onclick="changeTab('group', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/681/681494.png" class="nav-img"></div>
            <span class="nav-text">GROUP</span>
        </div>
        <div class="nav-item" onclick="changeTab('earnings', this)">
            <div class="nav-icon-frame" style="background: var(--c-purple);"><img src="https://cdn-icons-png.flaticon.com/512/1355/1355238.png" class="nav-img"></div>
            <span class="nav-text">EARN</span>
        </div>
        <div class="nav-item" onclick="changeTab('accelerate', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/1356/1356479.png" class="nav-img"></div>
            <span class="nav-text">BOOST</span>
        </div>
        <div class="nav-item" onclick="changeTab('wallet', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/855/855275.png" class="nav-img"></div>
            <span class="nav-text">WALLET</span>
        </div>
    </nav>

    <script>
        let balance = 0;
        let energy = 2000;
        let tg = window.Telegram.WebApp;

        function changeTab(tabId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        function makeTap(e) {
            if(energy < 10) return;
            balance += 0.001;
            energy -= 10;
            updateUI();

            // Texto flotante
            const p = document.createElement('div');
            p.innerText = "+0.001";
            p.style.position = 'fixed';
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            p.style.color = '#00f2ff';
            p.style.fontWeight = '900';
            p.style.fontSize = '24px';
            p.style.pointerEvents = 'none';
            p.style.zIndex = '500';
            p.animate([{transform:'translateY(0)', opacity:1}, {transform:'translateY(-100px)', opacity:0}], {duration:600});
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            
            // Evolución Visual
            if(balance >= 0.5) {
                document.getElementById('main-titan').src = "https://purepng.com/public/uploads/large/purepng.com-robotrobotprogrammable-machineelectronic-computermachinery-1701528352662idsc3.png";
                document.getElementById('rank-txt').innerText = "PILOTO: COMANDANTE";
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(3);
            document.getElementById('nrg-fill').style.width = (energy/20) + "%";
        }

        setInterval(() => { if(energy < 2000) { energy += 5; updateUI(); } }, 2000);
        window.onload = () => { tg.expand(); updateUI(); };
    </script>
</body>
</html>
