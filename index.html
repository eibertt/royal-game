<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN B - SISTEMA OPERATIVO</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://unpkg.com/@tonconnect/sdk@latest/dist/tonconnect-sdk.min.js"></script>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="fondo.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="game-container">
        <div class="hologram-panel" style="display: flex; justify-content: space-between; padding: 15px; margin: 15px;">
            <div>
                <small style="color: var(--hologram-pink)">T-COINS</small>
                <div id="coin-balance" style="font-size: 1.8rem; font-weight: bold;">0</div>
            </div>
            <div style="text-align: right;">
                <small>RANGO ACTUAL</small>
                <div id="rank-display" class="glow-text">RECLUTA</div>
            </div>
        </div>

        <div class="robot-core">
            <div id="effect-container"></div>
            <div class="energy-ring" id="heat-ring"></div>
            <img src="robot1.png" id="robot-display" onclick="handleTap(event)">
        </div>

        <div class="hologram-panel" style="margin: 15px; padding: 10px;">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem;">
                <span>ESTADO: <span id="system-status">ESTABLE</span></span>
                <span id="xp-text">XP: 0 / 4500</span>
            </div>
            <div style="width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; margin-top: 5px; border: 1px solid var(--hologram-blue);">
                <div id="xp-bar" style="width: 0%; height: 100%; background: var(--hologram-blue); box-shadow: 0 0 15px var(--hologram-blue);"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="location.reload()">HOME</div>
            <div class="nav-item" onclick="jugarRuleta()">CASINO</div>
            <div class="nav-item" style="color: var(--gold); font-weight: bold;" onclick="abrirTienda()">SHIPS</div>
            <div class="nav-item" onclick="reclamarBonoReferido()">FRIENDS</div>
            <div class="nav-item" onclick="conectarBilletera()">WALLET</div>
        </nav>
    </div>

    <script src="game_logic.js"></script>
    <script src="casino_logic.js"></script>
    <script src="referrals.js"></script>
    <script src="wallet_system.js"></script>

    <script>
        function abrirTienda() {
            alert("Accediendo al Astillero... Cargando naves de $1 a $15 USDT");
            // Aquí llamaríamos a la visualización de ships_db.json
        }
    </script>
</body>
</html>
