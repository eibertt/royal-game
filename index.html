<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN OVERDRIVE - DIGITAL TOUR</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        :root { --neon-cyan: #00f2ff; --neon-purple: #9d00ff; --dark-metal: #08080c; --glass: rgba(0, 15, 25, 0.6); }
        
        body, html { margin: 0; padding: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; height: 100vh; }

        /* EL MOTOR 3D AL FONDO (CIUDAD CIBERNÉTICA) */
        #render-canvas { position: fixed; top: 0; left: 0; z-index: 1; outline: none; filter: blur(2px) brightness(0.7); }

        /* INTERFAZ HUD TIPO CRISTAL (GLASSMORPHISM) */
        .hud-overlay {
            position: relative; z-index: 10; pointer-events: none;
            height: 100vh; display: flex; flex-direction: column; justify-content: space-between;
            background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%);
        }

        .cyber-panel {
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 20px;
            padding: 15px; pointer-events: auto;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        /* NÚMEROS NEÓN PRO */
        .neon-text-glow { text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-cyan); }

        /* BARRA DE ENERGÍA ESTILO COMPONENTE FÍSICO */
        .energy-track { width: 100%; height: 8px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; margin-top: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .energy-fill { 
            height: 100%; background: linear-gradient(90deg, var(--neon-cyan), #bc13fe); 
            box-shadow: 0 0 15px var(--neon-cyan); transition: width 0.3s ease; 
        }

        /* NAVEGACIÓN PROFESIONAL (5 BOTONES METAL-NEÓN) */
        nav {
            position: fixed; bottom: 20px; left: 15px; right: 15px; height: 95px;
            background: rgba(5, 5, 10, 0.9); backdrop-filter: blur(20px);
            border-radius: 28px; border: 1px solid rgba(0, 242, 255, 0.3);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.8);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.4; transition: 0.3s; color: #555; }
        .nav-item.active { opacity: 1; transform: translateY(-8px); color: var(--neon-cyan); }
        .nav-icon-frame {
            width: 48px; height: 48px; border-radius: 14px;
            background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05);
            display: flex; align-items: center; justify-content: center; overflow: hidden;
        }
        .active .nav-icon-frame { border-color: var(--neon-cyan); box-shadow: 0 0 15px var(--neon-cyan); background: rgba(0,242,255,0.1); }
        .nav-img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); }
        .active .nav-img { filter: grayscale(0); }
        .nav-text { font-size: 8px; margin-top: 5px; font-weight: 900; letter-spacing: 1px; }

        /* PESTAÑAS */
        .view { display: none; height: 80vh; padding: 20px; overflow-y: auto; z-index: 20; position: relative; }
        .view.active { display: block; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* CARTAS DE NAVES HQ (EARNINGS) */
        .ship-card {
            background: linear-gradient(90deg, #0a0a1a, #1a1a3a);
            border-radius: 20px; padding: 15px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 20px;
            border: 1px solid rgba(157, 0, 255, 0.2);
        }
        .ship-visual { width: 80px; height: 80px; border-radius: 15px; object-fit: cover; border: 2px solid #333; }
        
        /* EFECTO CLICK PRO */
        .tap-point {
            position: fixed; color: var(--neon-cyan); font-weight: 900; font-size: 28px;
            pointer-events: none; animation: flyUp 0.6s forwards; z-index: 500;
            text-shadow: 0 0 10px var(--neon-cyan);
        }
        @keyframes flyUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-120px); } }
    </style>
</head>
<body>

    <canvas id="render-canvas"></canvas>

    <div class="hud-overlay">
        <div class="p-6 flex justify-between items-start">
            <div class="cyber-panel">
                <p id="rank-name" class="text-[9px] text-purple-400 font-black tracking-widest">SISTEMA: RECLUTA</p>
                <h1 class="text-4xl font-black neon-text-glow" id="balance">0.000</h1>
                <p class="text-[8px] text-cyan-500">T-COINS GENERADOS</p>
            </div>
            <div class="text-right">
                <div class="cyber-panel py-2 px-5">
                    <span class="text-[10px] font-black text-white">ENERGÍA: <span id="nrg-text">2000</span></span>
                    <div class="energy-track"><div id="nrg-bar" class="energy-fill" style="width: 100%"></div></div>
                </div>
            </div>
        </div>

        <div id="view-home" class="view active flex flex-col items-center justify-center" onclick="handleTap(event)">
            <img id="main-titan" src="https://www.pngmart.com/files/11/Sci-Fi-Robot-PNG-Transparent-Image.png" class="w-80 filter drop-shadow-[0_0_30px_rgba(0,242,255,0.4)] cursor-pointer">
            <div class="absolute bottom-28 left-0 w-full text-center">
                <p class="text-[11px] text-cyan-400 font-bold animate-pulse tracking-[6px]">TOQUE EL NÚCLEO</p>
            </div>
        </div>

        <div id="view-earnings" class="view mt-20">
            <h2 class="text-xl font-black mb-6 text-cyan-400 border-b border-cyan-900 pb-2">CENTRO DE MINERÍA</h2>
            
            <div class="ship-card">
                <img src="https://images.unsplash.com/photo-1581092160562-40aa08e78837?q=80&w=200" class="ship-visual">
                <div class="flex-1">
                    <h3 class="font-bold text-sm text-white">DRILL-BOT V1</h3>
                    <p class="text-[10px] text-gray-400">Minado: 10/h</p>
                </div>
                <button class="bg-cyan-500 text-black font-black px-4 py-2 rounded-xl text-[10px]">2 USDT</button>
            </div>

            <div class="ship-card border-amber-600 bg-amber-900/10">
                <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=200" class="ship-visual">
                <div class="flex-1">
                    <h3 class="font-bold text-sm text-amber-500">TITÁN GALAXY</h3>
                    <p class="text-[10px] text-gray-400">Minado: 20,000/h</p>
                </div>
                <button class="bg-amber-600 text-black font-black px-4 py-2 rounded-xl text-[10px]">15 USDT</button>
            </div>
        </div>

        <div id="view-group" class="view text-center mt-20"><h2 class="text-2xl font-black text-purple-500">UNIÓN DE CLANES</h2></div>
        <div id="view-accelerate" class="view text-center mt-20"><h2 class="text-2xl font-black text-red-500">ACELERADORES</h2></div>
        <div id="view-wallet" class="view text-center mt-20"><h2 class="text-2xl font-black text-green-500">BILLETERA USDT</h2></div>
    </div>

    <nav>
        <div class="nav-item active" onclick="switchTab('home', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/3563/3563417.png" class="nav-img"></div>
            <span class="nav-text">HOME</span>
        </div>
        <div class="nav-item" onclick="switchTab('group', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/1189/1189132.png" class="nav-img"></div>
            <span class="nav-text">GROUP</span>
        </div>
        <div class="nav-item" onclick="switchTab('earnings', this)">
            <div class="nav-icon-frame" style="background: rgba(157,0,255,0.1);"><img src="https://cdn-icons-png.flaticon.com/512/2534/2534204.png" class="nav-img"></div>
            <span class="nav-text">EARN</span>
        </div>
        <div class="nav-item" onclick="switchTab('accelerate', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/3163/3163624.png" class="nav-img"></div>
            <span class="nav-text">BOOST</span>
        </div>
        <div class="nav-item" onclick="switchTab('wallet', this)">
            <div class="nav-icon-frame"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" class="nav-img"></div>
            <span class="nav-text">WALLET</span>
        </div>
    </nav>

    <script>
        // --- CONFIGURACIÓN DEL MOTOR 3D (CIUDAD CIBERNÉTICA) ---
        // Usamos Three.js para renderizar la ciudad de fondo
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('render-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // ILUMINACIÓN VOLUMÉTRICA
        const pLight = new THREE.PointLight(0x00f2ff, 3, 100); pLight.position.set(5, 5, 5); scene.add(pLight);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // CAMPO DE ESTRELLAS 3D
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<4000; i++) starPos.push(THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.05}));
        scene.add(stars);

        camera.position.z = 5;

        // ANIMACIÓN DEL MOTOR 3D
        function animate() { requestAnimationFrame(animate); stars.rotation.y += 0.0005; renderer.render(scene, camera); }

        // --- LÓGICA DE JUEGO & PERSISTENCIA ---
        let balance = parseFloat(localStorage.getItem('titan_balance')) || 0;
        let energy = 2000;
        let tg = window.Telegram.WebApp;

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(3);
            document.getElementById('nrg-text').innerText = energy;
            document.getElementById('nrg-bar').style.width = (energy / 20) + "%";
            localStorage.setItem('titan_balance', balance); // PERSISTENCIA TOTAL
            
            // Evolución de Rango y Robot Real
            if(balance >= 0.5) {
                document.getElementById('main-titan').src = "https://www.pngmart.com/files/11/Sci-Fi-Robot-PNG-Photos.png";
                document.getElementById('rank-name').innerText = "SISTEMA: COMANDANTE";
            }
        }

        // SISTEMA SPA (SINGLE PAGE APPLICATION) - 5 BOTONES FUNCIONALES
        function switchTab(tabId, el) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + tabId).classList.add('active');
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function handleTap(e) {
            if(energy < 10) return;
            balance += 0.001; energy -= 10;
            
            // Efecto Visual Pro (GSAP)
            gsap.to('#main-titan', { scale: 0.9, duration: 0.1, yoyo: true, repeat: 1 });
            
            // Texto Flotante HQ
            const p = document.createElement('div');
            p.innerText = "+0.001"; p.className = 'tap-point';
            p.style.left = e.clientX + 'px'; p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 600);

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        }

        setInterval(() => { if(energy < 2000) { energy += 5; updateUI(); } }, 2000);
        window.onload = () => { tg.expand(); updateUI(); animate(); };
        window.onresize = () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); };
    </script>
</body>
</html>
