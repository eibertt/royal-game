<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN OVERDRIVE 3D</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">

    <style>
        :root { --neon: #00f2ff; --gold: #ffcc00; --bg: #020205; }
        body, html { margin: 0; padding: 0; background: var(--bg); overflow: hidden; font-family: 'Orbitron', sans-serif; height: 100vh; }

        /* CANVAS 3D (EL MOTOR) */
        #render-canvas { position: fixed; top: 0; left: 0; z-index: 1; outline: none; }

        /* INTERFAZ HUD (CAPA SUPERIOR) */
        .hud-overlay {
            position: relative; z-index: 10; pointer-events: none;
            height: 100vh; display: flex; flex-direction: column; justify-content: space-between;
            padding: 25px; background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.4) 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 255, 0.2); border-radius: 20px;
            padding: 15px; pointer-events: auto;
        }

        /* ANIMACIÓN DE NÚMEROS */
        .counter-glow { text-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon); }

        /* BARRA DE ENERGÍA DE FUSIÓN */
        .energy-track { width: 100%; height: 6px; background: rgba(0,0,0,0.5); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .energy-fill { 
            height: 100%; background: linear-gradient(90deg, var(--neon), #bc13fe); 
            box-shadow: 0 0 15px var(--neon); transition: width 0.3s ease; 
        }

        /* NAVEGACIÓN TIPO CONSOLA DE NAVE */
        nav {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            height: 85px; background: rgba(10, 10, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 30px;
            display: flex; justify-content: space-around; align-items: center;
            z-index: 100; pointer-events: auto;
        }

        .nav-item { display: flex; flex-direction: column; align-items: center; opacity: 0.4; transition: 0.4s; cursor: pointer; }
        .nav-item.active { opacity: 1; transform: translateY(-10px); color: var(--neon); }
        .nav-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 5px var(--neon)); margin-bottom: 4px; }

        /* EFECTO CLICK */
        .tap-particle {
            position: absolute; font-weight: 900; color: var(--neon); pointer-events: none;
            z-index: 1000; font-size: 24px; animation: particleAnim 0.8s ease-out forwards;
        }
        @keyframes particleAnim {
            0% { transform: scale(1) translateY(0); opacity: 1; }
            100% { transform: scale(2) translateY(-150px); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="render-canvas"></canvas>

    <div class="hud-overlay">
        <div class="flex justify-between items-start">
            <div class="glass-card">
                <p class="text-[9px] tracking-[5px] text-cyan-400 font-bold uppercase">Reactor Core</p>
                <h1 class="text-4xl font-black counter-glow" id="balance">0.000</h1>
                <p class="text-[8px] text-gray-400">T-COINS COLLECTED</p>
            </div>
            <div class="text-right">
                <div class="glass-card py-2 px-5">
                    <span class="text-[10px] font-bold text-purple-400">ENERGÍA: <span id="nrg-text">2000</span></span>
                    <div class="energy-track"><div id="nrg-bar" class="energy-fill" style="width: 100%"></div></div>
                </div>
            </div>
        </div>

        <div class="flex-1 w-full pointer-events-auto" id="touch-zone"></div>

        <div class="mb-24 text-center">
            <div class="inline-block glass-card border-none bg-black/40 px-8 py-1">
                <p class="text-[10px] tracking-[8px] animate-pulse" id="rank-name">PILOT: RECRUIT</p>
            </div>
        </div>
    </div>

    <nav>
        <div class="nav-item active" onclick="navTo('home', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/3563/3563417.png" class="nav-icon">
            <span class="text-[8px] font-bold">CORE</span>
        </div>
        <div class="nav-item" onclick="navTo('earn', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/2534/2534204.png" class="nav-icon">
            <span class="text-[8px] font-bold">FLEET</span>
        </div>
        <div class="nav-item" onclick="navTo('wallet', this)">
            <img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" class="nav-icon">
            <span class="text-[8px] font-bold">ASSETS</span>
        </div>
    </nav>

    <script>
        // --- CONFIGURACIÓN DEL MOTOR 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('render-canvas'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);

        // LUCES CINEMÁTICAS
        const mainLight = new THREE.PointLight(0x00f2ff, 2, 100);
        mainLight.position.set(5, 5, 5);
        scene.add(mainLight);
        scene.add(new THREE.AmbientLight(0x404040, 0.5));

        // EL ROBOT (REEMPLAZADO POR UN OBJETO 3D DE EJEMPLO QUE SIEMPRE CARGA)
        // En un juego de 1GB, aquí cargaríamos un modelo .GLB de 50MB
        const geometry = new THREE.TorusKnotGeometry(1, 0.3, 100, 16);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0x222222, metalness: 1, roughness: 0.1, 
            emissive: 0x00f2ff, emissiveIntensity: 0.5 
        });
        const robotCore = new THREE.Mesh(geometry, material);
        scene.add(robotCore);
        camera.position.z = 4;

        // ANIMACIÓN DE FONDO (ESTRELLAS)
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<5000; i++) {
            starCoords.push(THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100));
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1}));
        scene.add(stars);

        // --- LÓGICA DE JUEGO ---
        let balance = parseFloat(localStorage.getItem('titan_bal')) || 0;
        let energy = 2000;
        let tg = window.Telegram.WebApp;

        function animate() {
            requestAnimationFrame(animate);
            robotCore.rotation.y += 0.01;
            robotCore.rotation.x += 0.005;
            stars.rotation.y += 0.0005;
            renderer.render(scene, camera);
        }

        document.getElementById('touch-zone').addEventListener('click', (e) => {
            if(energy < 10) return;
            
            balance += 0.001;
            energy -= 10;
            localStorage.setItem('titan_bal', balance);

            // Efecto Visual 3D
            gsap.to(robotCore.scale, { x: 1.2, y: 1.2, z: 1.2, duration: 0.1, yoyo: true, repeat: 1 });
            mainLight.intensity = 4;
            setTimeout(() => mainLight.intensity = 2, 100);

            // Partícula de Texto
            const p = document.createElement('div');
            p.className = 'tap-particle';
            p.innerText = "+0.001";
            p.style.left = e.clientX + 'px';
            p.style.top = e.clientY + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);

            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            updateUI();
        });

        function updateUI() {
            document.getElementById('balance').innerText = balance.toFixed(3);
            document.getElementById('nrg-text').innerText = energy;
            document.getElementById('nrg-bar').style.width = (energy / 20) + "%";
            
            if(balance > 10) {
                document.getElementById('rank-name').innerText = "PILOT: COMMANDER";
                material.emissive.setHex(0xbc13fe); // Cambia el color del robot a púrpura pro
            }
        }

        function navTo(page, el) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
        }

        setInterval(() => { if(energy < 2000) { energy += 5; updateUI(); } }, 2000);
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
        updateUI();
        tg.expand();
    </script>
</body>
</html>
