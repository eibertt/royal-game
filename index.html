<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN B - ENDGAME</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; color: white; }
        #ui-top { position: absolute; top: 0; width: 100%; display: flex; justify-content: space-between; padding: 20px; box-sizing: border-box; z-index: 100; }
        .panel { background: rgba(0, 242, 255, 0.1); border: 1px solid #00f2ff; padding: 10px; backdrop-filter: blur(10px); }
        
        /* BOSS HP BAR */
        #boss-ui { position: absolute; top: 80px; width: 100%; text-align: center; z-index: 100; }
        .hp-bar { width: 300px; height: 10px; background: #333; margin: 10px auto; border-radius: 5px; overflow: hidden; }
        .hp-fill { width: 100%; height: 100%; background: #ff0055; box-shadow: 0 0 10px #ff0055; transition: 0.2s; }

        /* FOOTER ACTIONS */
        #footer { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; z-index: 100; }
        .btn-action { background: #000; border: 2px solid #00f2ff; color: #00f2ff; padding: 15px 30px; cursor: pointer; font-weight: 900; transition: 0.3s; }
        .btn-action:hover { background: #00f2ff; color: #000; box-shadow: 0 0 20px #00f2ff; }
        .btn-ton { border-color: #0088cc; color: #0088cc; }
    </style>
</head>
<body>

    <div id="ui-top">
        <div class="panel">CLAN: TITAN_FORCE [x1.5 Bonus]</div>
        <div class="panel">WALLET: <span id="balance">0.00</span> T-COINS</div>
    </div>

    <div id="boss-ui">
        <p style="color: #ff0055; font-size: 10px; letter-spacing: 5px;">ANOMALÍA DETECTADA</p>
        <div class="hp-bar"><div id="hp-fill" class="hp-fill"></div></div>
    </div>

    <div id="footer">
        <button class="btn-action" onclick="attackBoss()">ATAQUE LÁSER</button>
        <button class="btn-action btn-ton" onclick="exchangeCoins()">WITHDRAW TO TON</button>
    </div>

    <script>
        let coins = 0;
        let bossHP = 100;

        // --- LÓGICA DE JUEGO ---
        function attackBoss() {
            if(bossHP <= 0) return;
            bossHP -= 2;
            coins += 0.5 * 1.5; // Ganancia + bono de clan
            updateUI();
            
            // Efecto visual: Sacudida de cámara
            camera.position.x += (Math.random() - 0.5) * 0.2;
            setTimeout(() => camera.position.x = 0, 50);
        }

        function updateUI() {
            document.getElementById('balance').innerText = coins.toFixed(2);
            document.getElementById('hp-fill').style.width = bossHP + "%";
            if(bossHP <= 0) {
                document.querySelector('#boss-ui p').innerText = "METEORITO DESTRUIDO - PREMIO RECLAMADO";
            }
        }

        function exchangeCoins() {
            if(coins < 10) {
                alert("Mínimo de retiro: 10 T-COINS");
            } else {
                alert("Conectando con TON Wallet... Enviando " + (coins/10).toFixed(2) + " TON");
                coins = 0;
                updateUI();
            }
        }

        // --- RENDER 3D (CORE) ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // El Boss (Meteorito)
        const bossGeo = new THREE.IcosahedronGeometry(2, 0);
        const bossMat = new THREE.MeshStandardMaterial({ color: 0xff0055, wireframe: true });
        const boss = new THREE.Mesh(bossGeo, bossMat);
        scene.add(boss);

        scene.add(new THREE.PointLight(0xff0055, 2, 50));
        scene.add(new THREE.AmbientLight(0x404040, 1));
        camera.position.z = 8;

        function animate() {
            requestAnimationFrame(animate);
            boss.rotation.x += 0.01;
            boss.rotation.y += 0.01;
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
