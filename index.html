<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN B - ODYSSEY 3D</title>
    <link rel="stylesheet" href="./styles.css">
    <style>
        /* Ajuste para que el video ocupe toda la pantalla de fondo */
        #bg-video {
            position: fixed;
            right: 0;
            bottom: 0;
            min-width: 100%;
            min-height: 100%;
            z-index: -1;
            filter: brightness(0.5); /* Oscurece un poco el video para resaltar la UI */
            object-fit: cover;
        }
    </style>
</head>
<body>

    <video autoplay muted loop id="bg-video">
        <source src="./fondo.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div id="game-container">
        <div class="hologram-panel" style="display: flex; justify-content: space-between; padding: 15px; margin: 10px; border: 1px solid #00e5ff;">
            <div>
                <small style="color: #ff00de">T-COINS</small>
                <div id="coin-balance" style="font-size: 2rem; font-weight: bold; text-shadow: 0 0 10px #00e5ff;">0</div>
            </div>
            <div style="text-align: right;">
                <small>RANGO</small>
                <div id="rank-display" style="color: #00e5ff; font-weight: bold;">RECLUTA</div>
            </div>
        </div>

        <div id="robot-container" style="width: 100%; height: 380px; position: relative; z-index: 5;" onclick="if(window.handleRobotTap) window.handleRobotTap();">
            </div>

        <div class="hologram-panel" style="margin: 10px; padding: 10px; background: rgba(0,0,0,0.4);">
            <div style="display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 5px;">
                <span>NÚCLEO: <b id="system-status" style="color:#00ff88;">CONECTANDO...</b></span>
                <span id="xp-text">SINCRO: 0%</span>
            </div>
            <div style="width: 100%; height: 8px; background: #111; border: 1px solid #00e5ff; border-radius: 4px; overflow: hidden;">
                <div id="xp-bar" style="width: 5%; height: 100%; background: #00e5ff; box-shadow: 0 0 10px #00e5ff;"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active" onclick="location.reload()">HOME</div>
            <div class="nav-item" onclick="jugarRuleta()">CASINO</div>
            <div class="nav-item" style="color: #ffcc00; font-weight: bold;" onclick="abrirTienda()">SHIPS</div>
            <div class="nav-item" onclick="reclamarBonoReferido()">FRIENDS</div>
            <div class="nav-item" onclick="conectarBilletera()">WALLET</div>
        </nav>
    </div>

    <script type="module" src="./robot_3d.js?v=16"></script>
    <script src="./config.js?v=16"></script>
    <script src="./audio_engine.js?v=16"></script>
    <script src="./vfx_system.js?v=16"></script>
    <script src="./game_logic.js?v=16"></script>
    <script src="./casino_logic.js?v=16"></script>
    <script src="./referrals.js?v=16"></script>
    <script src="./wallet_system.js?v=16"></script>

    <script>
        // Verificación de inicio
        window.onload = function() {
            console.log("TITAN B: Sistemas vinculados en raíz.");
            const status = document.getElementById('system-status');
            if(status) status.innerText = "ESTABLE";
        };

        // Tu tienda con precios reales
        function abrirTienda() {
            alert("--- TIENDA TITAN B ---\n1. Scout: $1 USDT\n2. Miner: $5 USDT\n3. Titan: $15 USDT");
        }
    </script>
    <script src="game_logic.js"></script>
    
    <script src="galaxy_engine.js"></script>

</body>
</html>
