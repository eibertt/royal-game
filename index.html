<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN B: MINING SHIP</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; }
        #gui { position: absolute; top: 15px; left: 15px; color: #0f0; z-index: 10; text-shadow: 0 0 8px #0f0; pointer-events: none; }
        #shop { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 20; }
        button { background: #0f0; color: #000; border: none; padding: 12px 25px; font-weight: bold; cursor: pointer; border-radius: 8px; box-shadow: 0 0 15px #0f0; font-size: 14px; }
        .token-float { position: absolute; color: #0f0; font-weight: bold; pointer-events: none; animation: floatUp 2s forwards; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body>

    <div id="gui">
        <h2 style="margin:0;">SISTEMA MINERO</h2>
        <p>T-COINS: <span id="wallet">0</span></p>
        <p id="status" style="color: #ff3333; font-size: 12px;">ESTADO: DESCONECTADA</p>
    </div>

    <div id="shop">
        <button id="buy-btn" onclick="activarMinado()">ENCENDER MOTORES</button>
    </div>

    <script>
        let tcoins = parseInt(localStorage.getItem('tcoins')) || 0;
        let isMining = false;

        // --- 1. CONFIGURACIÓN DE ESCENA ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205); // Fondo azul espacial muy oscuro
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // --- 2. ILUMINACIÓN (ESTO ES LO QUE HACÍA QUE SE VIERA NEGRO) ---
        const luzAmbiente = new THREE.AmbientLight(0xffffff, 1.2); // Luz base fuerte
        scene.add(luzAmbiente);

        const luzPuntual = new THREE.PointLight(0x00ff00, 2, 50); // Luz verde de la nave
        luzPuntual.position.set(5, 5, 5);
        scene.add(luzPuntual);

        // --- 3. CONSTRUCCIÓN DE LA NAVE VERDE ---
        const nave = new THREE.Group();
        const matVerde = new THREE.MeshPhongMaterial({ color: 0x00ff00, flatShading: true, shininess: 50 });
        const matFuego = new THREE.MeshBasicMaterial({ color: 0xffff00 }); // Motores amarillos

        // Cuerpo principal (un cono más grande para que se vea)
        const cuerpo = new THREE.Mesh(new THREE.ConeGeometry(1.2, 3.5, 4), matVerde);
        cuerpo.rotation.x = Math.PI / 2;
        nave.add(cuerpo);

        // Alas
        const alas = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 1), matVerde);
        alas.position.z = -0.5;
        nave.add(alas);

        // Propulsores (Los que "prenden")
        const propL = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.5), matFuego);
        propL.position.set(-0.5, 0, -1.8);
        propL.rotation.x = Math.PI / 2;
        
        const propR = propL.clone();
        propR.position.x = 0.5;
        
        nave.add(propL, propR);
        scene.add(nave);

        // --- 4. ESTRELLAS DE FONDO ---
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<800; i++) starPos.push((Math.random()-0.5)*100, (Math.random()-0.5)*100, (Math.random()-0.5)*100);
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.1}));
        scene.add(stars);

        // --- 5. POSICIÓN DE CÁMARA ---
        camera.position.set(0, 2, 6);
        camera.lookAt(0, 0, 0);

        // --- 6. LÓGICA DE JUEGO ---
        function activarMinado() {
            isMining = true;
            document.getElementById('buy-btn').style.display = 'none';
            document.getElementById('status').innerText = "ESTADO: MINANDO +50/3s";
            document.getElementById('status').style.color = "#0f0";
            setInterval(generarCoins, 3000); // Mina cada 3 segundos para que lo veas rápido
        }

        function generarCoins() {
            tcoins += 50;
            localStorage.setItem('tcoins', tcoins);
            document.getElementById('wallet').innerText = tcoins;
            
            // Texto flotante lateral
            const span = document.createElement('div');
            span.className = 'token-float';
            span.style.left = "60%";
            span.style.top = "50%";
            span.innerText = "+50 T-COINS";
            document.body.appendChild(span);
            setTimeout(() => span.remove(), 2000);
        }

        // --- 7. ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);
            nave.rotation.y += 0.01; // La nave gira para que se vea el 3D
            
            if(isMining) {
                // Los motores parpadean cuando minas
                const s = 1 + Math.sin(Date.now() * 0.02) * 0.3;
                propL.scale.set(s, s, s);
                propR.scale.set(s, s, s);
                nave.position.y = Math.sin(Date.now() * 0.005) * 0.2;
            }
            
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('wallet').innerText = tcoins;
        animate();
    </script>  <div id="pantalla-earnings" style="position:fixed; top:0; left:0; width:100%; height:calc(100% - 75px); background:#000; z-index:500; display:none;">
    <iframe src="nave.html" style="width:100%; height:100%; border:none;"></iframe>
</div>

<div id="navbar" style="position: fixed; bottom: 0; left: 0; width: 100%; height: 75px; background: rgba(0,0,0,0.9); border-top: 2px solid #1a1a1a; display: flex; justify-content: space-around; align-items: center; z-index: 1000; backdrop-filter: blur(10px);">
    
    <div onclick="cambiarSeccion('home')" style="text-align:center; cursor:pointer; flex:1;">
        <div style="font-size:22px; color:#00f2ff;">🏠</div>
        <span style="font-size:10px; color:#00f2ff;">Home</span>
    </div>

    <div onclick="cambiarSeccion('earnings')" style="flex:1; display:flex; flex-direction:column; align-items:center; cursor:pointer;">
        <div style="background: #4e54ff; width:50px; height:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-top:-30px; border:3px solid #000;">
            <div style="font-size:25px;">🛸</div>
        </div>
        <span style="font-size:10px; color:#fff;">Earnings</span>
    </div>
</div>

<script>
// ESTA FUNCIÓN ES LA QUE INTERCAMBIA LAS PANTALLAS
function cambiarSeccion(tipo) {
    const pEarnings = document.getElementById('pantalla-earnings');
    
    if(tipo === 'earnings') {
        pEarnings.style.display = 'block'; // Muestra la nave
    } else {
        pEarnings.style.display = 'none';  // Esconde la nave y muestra el robot
    }
}
</script>
</body>
</html>
