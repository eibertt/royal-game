<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN B: INTRO FIX</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        
        /* VIDEO DE INTRO/FONDO */
        #video-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; background: #000;
        }
        #bg-video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.5); }

        /* INTERFAZ */
        #gui { position: absolute; top: 20px; left: 20px; z-index: 10; color: #00f2ff; pointer-events: none; }
        .bar-bg { width: 180px; height: 10px; border: 1px solid #00f2ff; margin-top: 10px; background: rgba(0,0,0,0.5); }
        #energy-bar { width: 100%; height: 100%; background: #00f2ff; }
        
        /* BOTÓN DE ARRANQUE (Solo sale si el video no arranca solo) */
        #start-prompt {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #00f2ff; border: 2px solid #00f2ff; padding: 20px;
            background: rgba(0,0,0,0.8); cursor: pointer; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="start-prompt" onclick="iniciarTodo()">TOCA PARA INICIAR SISTEMA</div>

    <div id="video-container">
        <video id="bg-video" loop muted playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <div id="gui" style="display:none;">
        <h1>TITAN B: REVOLUTION</h1>
        <p>T-COINS: <span id="coin-txt">0</span></p>
        <div class="bar-bg"><div id="energy-bar"></div></div>
    </div>

    <script>
        function iniciarTodo() {
            document.getElementById('start-prompt').style.display = 'none';
            document.getElementById('gui').style.display = 'block';
            const v = document.getElementById('bg-video');
            v.play();
        }

        // --- MOTOR DEL JUEGO ---
        let coins = parseInt(localStorage.getItem('tcoins')) || 0;
        let energy = 100;
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.2));

        const textureLoader = new THREE.TextureLoader();
        let robot;
        // Cargamos tu NANO SAGE (robot1.png)
        textureLoader.load('robot1.png', (tex) => {
            const mat = new THREE.SpriteMaterial({ map: tex });
            robot = new THREE.Sprite(mat);
            robot.scale.set(4.5, 4.5, 1);
            scene.add(robot);
        });

        window.addEventListener('mousedown', () => {
            if(energy >= 5) {
                energy -= 5; coins += 10;
                localStorage.setItem('tcoins', coins);
                document.getElementById('coin-txt').innerText = coins;
                document.getElementById('energy-bar').style.width = energy + "%";
            }
        });

        camera.position.z = 5;
        function animate() {
            requestAnimationFrame(animate);
            if(robot) robot.position.y = Math.sin(Date.now() * 0.002) * 0.1;
            renderer.render(scene, camera);
        }
        animate();
    </script>   <div id="navbar" style="position: fixed; bottom: 0; width: 100%; height: 70px; background: #000; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; z-index: 1000;">
    <div onclick="irA('home')" style="text-align:center; color:#fff; cursor:pointer;">
        <div style="font-size:20px;">🏠</div>
        <span style="font-size:10px;">Home</span>
    </div>
    <div onclick="irA('earnings')" style="text-align:center; color:#fff; cursor:pointer;">
        <div style="background:#4e54ff; width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; margin-top:-20px; box-shadow: 0 0 15px #4e54ff;">
            <img src="https://img.icons8.com/ios-filled/50/ffffff/ufo.png" style="width:25px;">
        </div>
        <span style="font-size:10px; color:#4e54ff;">Earnings</span>
    </div>
    <div style="text-align:center; color:#888;">
        <div style="font-size:20px;">🚀</div>
        <span style="font-size:10px;">Accelerate</span>
    </div>
</div>

<iframe id="ventana-nave" src="nave.html" style="position:fixed; top:0; left:0; width:100%; height:calc(100% - 70px); border:none; display:none; z-index:500;"></iframe>

<script>
function irA(seccion) {
    const naveFrame = document.getElementById('ventana-nave');
    const guiPrincipal = document.getElementById('gui'); // Tu HUD de monedas actual
    
    if(seccion === 'earnings') {
        naveFrame.style.display = 'block';
        if(guiPrincipal) guiPrincipal.style.opacity = '0.3'; // Se oscurece el fondo
    } else {
        naveFrame.style.display = 'none';
        if(guiPrincipal) guiPrincipal.style.opacity = '1';
    }
}
</script>
 </body>
</html>
