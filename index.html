<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --robot-cyan: #22d3ee;
            --robot-core: #0891b2;
        }

        body {
            background-color: #020617; /* Fondo Espacial Profundo */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* CONTENEDOR DEL ROBOT */
        .robot-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* EL CUERPO DEL ROBOT (EMOJI PARA ESTA BASE, LUEGO PODEMOS USAR PNG) */
        .titan-bot {
            font-size: 150px;
            filter: drop-shadow(0 0 15px var(--robot-cyan));
            animation: robot-float 4s ease-in-out infinite;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 20;
        }

        /* AURA DE ENERGÍA ELECTRÓNICA */
        .energy-field {
            position: absolute;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(34, 211, 238, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            border: 2px dashed rgba(34, 211, 238, 0.3);
            animation: rotate-field 10s linear infinite;
        }

        /* ANIMACIONES */
        @keyframes robot-float {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-25px) scale(1.05); }
        }

        @keyframes rotate-field {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* REACCIÓN AL TOQUE (SHOCK) */
        .robot-container:active .titan-bot {
            transform: scale(0.8) rotate(-5deg);
            filter: drop-shadow(0 0 40px #fff);
        }

        .robot-container:active .energy-field {
            background: radial-gradient(circle, rgba(34, 211, 238, 0.5) 0%, rgba(0, 0, 0, 0) 60%);
            border-color: #fff;
            transform: scale(1.2);
        }

        /* NÚMERO FLOTANTE (+0.15) */
        .tap-value {
            position: absolute;
            color: #22d3ee;
            font-weight: 900;
            font-size: 32px;
            pointer-events: none;
            animation: data-float 0.7s ease-out forwards;
            font-family: sans-serif;
            text-shadow: 0 0 15px var(--robot-cyan);
            z-index: 100;
        }

        @keyframes data-float {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            100% { transform: translateY(-150px) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="robot-container" onclick="handleTap(event)">
        <div class="energy-field"></div>
        <div class="titan-bot" id="bot">🤖</div>
    </div>

    <script>
        function handleTap(e) {
            // Efecto de número flotante
            const val = document.createElement('div');
            val.innerText = "+0.15";
            val.className = 'tap-value';
            
            // Posicionamiento preciso
            const rect = e.currentTarget.getBoundingClientRect();
            val.style.left = (e.clientX - rect.left - 20) + 'px';
            val.style.top = (e.clientY - rect.top - 20) + 'px';
            
            e.currentTarget.appendChild(val);

            // Feedback háptico de Telegram
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }

            // Limpieza
            setTimeout(() => { val.remove(); }, 700);
        }
    </script>
</body>
</html>
