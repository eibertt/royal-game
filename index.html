<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TITAN B</title>
    <style>
        body { margin: 0; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        #galaxy-bg { position: fixed; width: 100%; height: 100%; z-index: -1; }
        #preloader { position: fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:999; display:flex; justify-content:center; align-items:center; }
    </style>
</head>
<body>

    <div id="preloader">CARGANDO SISTEMAS...</div>
    <canvas id="galaxy-bg"></canvas>
    <div id="robot-view" style="width:100%; height:50vh;"></div>

    <script src="config.js"></script>
    <script src="game_logic.js"></script>
    <script src="galaxy_engine.js"></script>

    <script type="module">
        import { init3D } from './robot_3d.js';
        
        // Función de seguridad: Si en 5 segundos no carga, forzar entrada
        setTimeout(() => {
            const loader = document.getElementById('preloader');
            if(loader) loader.style.display = 'none';
        }, 5000);

        window.addEventListener('load', () => {
            document.getElementById('preloader').style.display = 'none';
            try {
                init3D();
            } catch(e) {
                console.error("Error al iniciar Robot:", e);
            }
        });
    </script>
</body>
</html>
