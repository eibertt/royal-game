<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-blue: #00d2ff;
            --deep-blue: #06b6d4;
        }

        body {
            background-color: #020617; /* Fondo ultra oscuro */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* CONTENEDOR DEL PERSONAJE */
        .character-container {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* EL DIAMANTE TITÁN */
        .titan-diamond {
            font-size: 140px;
            filter: drop-shadow(0 0 25px var(--neon-blue));
            animation: float 3s ease-in-out infinite;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 10;
        }

        /* EFECTO DE RESPLANDOR TRASERO */
        .glow-aura {
            position: absolute;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 210, 255, 0.4) 0%, rgba(0, 0, 0, 0) 70%);
            border-radius: 50%;
            animation: pulse-aura 2s infinite;
        }

        /* ANIMACIÓN DE LEVITACIÓN */
        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* ANIMACIÓN DE PULSO */
        @keyframes pulse-aura {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        /* EFECTO AL TOCAR */
        .character-container:active .titan-diamond {
            transform: scale(0.85);
            filter: drop-shadow(0 0 50px #fff);
        }

        /* NÚMERO FLOTANTE (+0.15) */
        .floating-text {
            position: absolute;
            color: #fff;
            font-weight: 800;
            font-size: 24px;
            pointer-events: none;
            animation: rise-up 0.8s ease-out forwards;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        @keyframes rise-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-120px); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="character-container" onclick="handleTap(event)">
        <div class="glow-aura"></div>
        <div class="titan-diamond" id="hero">💎</div>
    </div>

    <script>
        function handleTap(e) {
            // Crear el texto flotante "+0.15"
            const text = document.createElement('div');
            text.innerText = "+0.15";
            text.className = 'floating-text';
            
            // Posicionar donde se hizo el toque (relativo al contenedor)
            const rect = e.currentTarget.getBoundingClientRect();
            text.style.left = (e.clientX - rect.left) + 'px';
            text.style.top = (e.clientY - rect.top) + 'px';
            
            e.currentTarget.appendChild(text);

            // Vibración (si es Telegram Web App)
            if (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }

            // Eliminar el texto después de la animación
            setTimeout(() => {
                text.remove();
            }, 800);
        }
    </script>
</body>
</html>
