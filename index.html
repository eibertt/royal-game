<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2ff; --purple: #bc13fe; --bg: #010103; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; height: 100vh; }
        #canvas-3d { position: fixed; top: 0; left: 0; z-index: 1; }

        /* HUD PRINCIPAL */
        .hud { position: relative; z-index: 10; pointer-events: none; height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        .glass { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border: 1px solid rgba(0,242,255,0.2); border-radius: 15px; padding: 15px; pointer-events: auto; }
        
        /* SECCIONES */
        .page { display: none; height: 100%; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* NAVEGACIÓN PRO */
        nav {
            position: fixed; bottom: 15px; left: 10px; right: 10px; height: 80px;
            background: rgba(10,10,20,0.95); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 100; pointer-events: auto;
        }
        .nav-btn { display: flex; flex-direction: column; align-items: center; opacity: 0.4; transition: 0.3s; }
        .nav-btn.active { opacity: 1; transform: translateY(-8px); color: var(--neon); }
        .nav-icon { width: 28px; height: 28px; filter: drop-shadow(0 0 5px var(--neon)); margin-bottom: 4px; }
    </style>
</head>
<body>

    <canvas id="canvas-3d"></canvas>

    <div class="hud">
        <div class="flex justify-between items-start mb-10">
            <div class="glass">
                <p class="text-[8px] text-cyan-400 tracking-[3px]">REACTOR CORE</p>
                <h1 id="bal" class="text-3xl font-black">0.000</h1>
            </div>
            <div class="glass text-right">
                <p class="text-[8px] text-purple-400 font-bold uppercase">Sistema OK</p>
                <div class="w-24 h-1.5 bg-gray-900 rounded-full mt-2 overflow-hidden">
                    <div id="nrg-bar" class="h-full bg-cyan-400 shadow-[0_0_10px_#00f2ff]" style="width: 100%"></div>
                </div>
            </div>
        </div>

        <div id="home" class="page active flex-1 flex items-center justify-center pointer-events-auto" onclick="mine(event)">
            <p class="absolute bottom-32 text-[10px] text-cyan-500 font-bold animate-pulse">TOQUE PARA MINAR NÚCLEO</p>
        </div>

        <div id="group" class="page flex-1"><div class="glass mt-20"><h2>SISTEMA DE CLANES</h2><p class="text-xs text-gray-400 mt-2">Próximamente: Ranking mundial.</p></div></div>
        <div id="earn" class="page flex-1"><div class="glass mt-20"><h2>CENTRO DE MINERÍA</h2><p class="text-xs text-gray-400 mt-2">Adquiere naves Nova.</p></div></div>
        <div id="boost" class="page flex-1"><div class="glass mt-20"><h2>ACELERADORES</h2><p class="text-xs text-gray-400 mt-2">Tareas y recompensas.</p></div></div>
        <div id="wallet" class="page flex-1"><div class="glass mt-20"><h2>BILLETERA</h2><p class="text-xs text-gray-400 mt-2">Retiros en USDT.</p></div></div>
    </div>

    <nav>
        <div class="nav-btn active" onclick="show('home', this)"><img src="https://cdn-icons-png.flaticon.com/512/3563/3563417.png" class="nav-icon"><span>HOME</span></div>
        <div class="nav-btn" onclick="show('group', this)"><img src="https://cdn-icons-png.flaticon.com/512/1189/1189132.png" class="nav-icon"><span>GROUP</span></div>
        <div class="nav-btn" onclick="show('earn', this)"><img src="https://cdn-icons-png.flaticon.com/512/2534/2534204.png" class="nav-icon"><span>EARN</span></div>
        <div class="nav-btn" onclick="show('boost', this)"><img src="https://cdn-icons-png.flaticon.com/512/3163/3163624.png" class="nav-icon"><span>BOOST</span></div>
        <div class="nav-btn" onclick="show('wallet', this)"><img src="https://cdn-icons-png.flaticon.com/512/2489/2489756.png" class="nav-icon"><span>WALLET</span></div>
    </nav>

    <script>
        // MOTOR 3D
        const sc = new THREE.Scene();
        const cam = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const ren = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-3d'), antialias: true, alpha: true });
        ren.setSize(window.innerWidth, window.innerHeight);

        // Geometría 3D de alta gama
        const geo = new THREE.TorusKnotGeometry(1.2, 0.4, 150, 20);
        const mat = new THREE.MeshStandardMaterial({ color: 0x00f2ff, metalness: 0.9, roughness: 0.1, wireframe: true });
        const obj = new THREE.Mesh(geo, mat);
        sc.add(obj);
        sc.add(new THREE.PointLight(0xffffff, 2, 100).clone().set(5,5,5));
        cam.position.z = 5;

        // ESTRELLAS DINÁMICAS
        const starGeo = new THREE.BufferGeometry();
        const starPos = [];
        for(let i=0; i<3000; i++) starPos.push(THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100));
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPos, 3));
        sc.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 0.05})));

        let bal = parseFloat(localStorage.getItem('titan_bal')) || 0;
        let nrg = 2000;
        let tg = window.Telegram.WebApp;

        function animate() { requestAnimationFrame(animate); obj.rotation.y += 0.01; ren.render(sc, cam); }

        function show(id, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            btn.classList.add('active');
            if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
        }

        function mine(e) {
            if(nrg < 10) return;
            bal += 0.001; nrg -= 10;
            localStorage.setItem('titan_bal', bal);
            gsap.to(obj.scale, {x:1.3, y:1.3, z:1.3, duration:0.1, yoyo:true, repeat:1});
            
            const p = document.createElement('div');
            p.innerText = "+0.001";
            p.style.cssText = `position:fixed; left:${e.clientX}px; top:${e.clientY}px; color:var(--neon); font-weight:900; animation:out 0.8s forwards; pointer-events:none; z-index:1000;`;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 800);
            updateUI();
        }

        function updateUI() {
            document.getElementById('bal').innerText = bal.toFixed(3);
            document.getElementById('nrg-bar').style.width = (nrg/20) + "%";
        }

        animate(); updateUI(); tg.expand();
    </script>
    <style>@keyframes out { to { transform: translateY(-100px) scale(2); opacity: 0; } }</style>
</body>
</html>
