<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>TITAN B: REVOLUTION</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Orbitron', sans-serif; }
        #hud { position: absolute; top: 20px; left: 20px; color: #00f2ff; z-index: 10; pointer-events: none; }
        .energy-bar { width: 200px; height: 10px; border: 1px solid #00f2ff; margin-top: 10px; background: rgba(0, 242, 255, 0.1); }
        #energy-fill { height: 100%; background: #00f2ff; width: 100%; transition: 0.3s; box-shadow: 0 0 10px #00f2ff; }
        #header { position: absolute; top: 10px; width: 100%; text-align: center; color: #00f2ff; text-shadow: 0 0 15px #00f2ff; z-index: 10; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="header"><h1>TITAN B: REVOLUTION</h1></div>
    
    <div id="hud">
        <p>T-COINS: <span id="coin-val">0</span></p>
        <p>ENERGÍA: <span id="energy-text">100</span>%</p>
        <div class="energy-bar"><div id="energy-fill"></div></div>
        <p style="font-size: 10px; margin-top: 20px; opacity: 0.7;">CLICK PARA DISPARAR LÁSER</p>
    </div>

    <script>
        let coins = 0;
        let energy = 100;

        // 1. CONFIGURACIÓN DE ESCENA 3D
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 2. FONDO DE ESTRELLAS
        const starGeo = new THREE.BufferGeometry();
        const starCoords = [];
        for(let i=0; i<2000; i++) {
            starCoords.push(THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100), THREE.MathUtils.randFloatSpread(100));
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0x00f2ff, size: 0.05 })));

        // Luces para ver el robot
        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const directionalLight = new THREE.DirectionalLight(0x00f2ff, 1);
        directionalLight.position.set(5, 5, 5);
        scene.add(directionalLight);

        camera.position.z = 5;

        // 3. CARGA DEL ROBOT (El código de tu archivo .gitkeep ahora aquí)
        const loader = new THREE.GLTFLoader();
        let robot;
        // Cargamos el modelo profesional desde la nube
        const modelURL = 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/RobotArm/glTF-Binary/RobotArm.glb';
        
        loader.load(modelURL, (gltf) => {
            robot = gltf.scene;
            robot.scale.set(2, 2, 2);
            robot.position.y = -1.5;
            scene.add(robot);
            console.log("¡Robot B instalado!");
        });

        // 4. LÓGICA DE JUEGO (Disparo y Energía)
        window.addEventListener('mousedown', () => {
            if(energy >= 5) {
                energy -= 5;
                coins += 10;
                updateUI();
                createLaser();
            }
        });

        function createLaser() {
            const laser = new THREE.Mesh(
                new THREE.CylinderGeometry(0.02, 0.02, 10),
                new THREE.MeshBasicMaterial({ color: 0x00f2ff })
            );
            laser.rotation.x = Math.PI / 2;
            scene.add(laser);
            setTimeout(() => scene.remove(laser), 100);
        }

        function updateUI() {
            document.getElementById('coin-val').innerText = coins;
            document.getElementById('energy-text').innerText = energy;
            document.getElementById('energy-fill').style.width = energy + "%";
        }

        // Recuperación de Energía pasiva
        setInterval(() => { if(energy < 100) { energy += 1; updateUI(); } }, 2000);

        function animate() {
            requestAnimationFrame(animate);
            if(robot) robot.rotation.y += 0.005; // El robot gira lentamente
            renderer.render(scene, camera);
        }
        animate();

        // Ajuste de pantalla si se gira el móvil
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
